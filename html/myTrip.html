<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- meta는 head에 있어서 본문에 드러나지 않는다.-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>나의 여행 앨범</h1>
        <p>이민형의 여행 사진과 미디어를 소개합니다.</p>
        <hr>

        <div class="trip-grid">
            <p class="trip-card">
                <strong class="trip-card-title">여행 사진 1</strong>
                <img
                    src="../media/profile.jpg"
                    alt="여행 사진 1"
                >
            </p>

            <p class="trip-card">
                <strong class="trip-card-title">여행 사진 2</strong>
                <img
                    src="../media/movie.gif"
                    alt="여행 사진 2"
                >
            </p>

            <p class="trip-card">
                <strong class="trip-card-title">여행 오디오</strong>
                <audio controls>
                    <source src="../media/music.mp3" type="audio/mpeg">
                    오디오를 재생할 수 없는 브라우저입니다.
                </audio>
            </p>

            <p class="trip-card">
                <strong class="trip-card-title">여행 영상</strong>
                <video controls>
                    <source src="../media/movie.mp4" type="video/mp4">
                    비디오를 재생할 수 없는 브라우저입니다.
                </video>
            </p>

            <p class="trip-card">
                <strong class="trip-card-title">추천 여행 영상</strong>
                <iframe
                    src="https://www.youtube.com/embed/TYQQFFMrBr0"
                    title="YouTube video player"
                    allowfullscreen>
                </iframe>
            </p>
        </div>
    </div>
</body>
</html>
