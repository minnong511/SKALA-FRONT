<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- meta는 head에 있어서 본문에 드러나지 않는다.-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <h1>나의 여행 앨범</h1>
    <p>이민형의 여행 사진</p>
    <hr>

    <div class="trip-grid">
        <article class="trip-card">
            <h2>여행 사진 1</h2>
            <img
                src="../media/profile.jpg"
                alt="여행 사진 1"
            >
        </article>

        <article class="trip-card">
            <h2>여행 사진 2</h2>
            <img
                src="../media/movie.gif"
                alt="여행 사진 2"
            >
        </article>

        <article class="trip-card">
            <h2>여행 음악</h2>
            <audio controls>
                <source src="../media/music.mp3" type="audio/mpeg">
                오디오를 재생할 수 없는 브라우저입니다.
            </audio>
        </article>

        <article class="trip-card">
            <h2>여행 영상</h2>
            <video controls>
                <source src="../media/movie.mp4" type="video/mp4">
                비디오를 재생할 수 없는 브라우저입니다.
            </video>
        </article>

        <article class="trip-card">
            <h2>추천 여행 영상</h2>
            <iframe
                src="https://www.youtube.com/embed/TYQQFFMrBr0"
                title="YouTube video player"
                allowfullscreen>
            </iframe>
        </article>
    </div>
</body>
</html>
