<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 연습</title>

    <style>
        * {
            box-sizing: border-box;
        }

        .container{
            display: flex;
        }

        .box {
            width :33.33%;
            padding : 20px;
        }

        .box1 {
            background-color: #bbb ;
        }

        .box2 {
            background-color: #ccc;
        }

        .box3 {
            background-color: #ddd;
        }
    </style>
</head>

<body>
    <h2>Flexbox로 상장 배치하기</h2>

    <div class="container">
        <div class="box box1">
            <p>첫 번째 상자</p>
        </div>

        <div class="box box2">
            <p>두 번째 상자</p>
        </div>

        <div class="box box3">
            <p>세 번째 상자</p>
        </div>
    </div>
</body>
</html>
