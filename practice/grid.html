<!DOCTYPE html>
<html lang="ko">
<head></head>
    <meta charset="UTF-8">
    <title >Grid 실습  </title> 

    <style> 
        .container {
            display: grid;
            grid-template-columns: repeat(3,100px);
            gap: 10px;

            border : 3px solid black;
            padding : 10px;
        }

        .box {
            height : 100px; 
            background-color: orange;
            border : 1px solid red;
        }
    </style>
</head>
<body>
    <div class = "container">
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
        <div class = "box">1</div>
        <div class = "box">2</div>
</body>

</html>
