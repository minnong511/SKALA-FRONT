<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flexbox 실습</title>

    <style>
        .container {
            display: flex; /* 자식들을 정렬하겠다*/
            justify-content: center; /* 가운데 정렬하겠다*/
            gap: 10px; /* 자식 사이 간격 */ 
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: skyblue;
            border: 1px solid blue;

            display: flex;
            justify-content: center; /* 여러 정렬 방법 선택하기 */
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
