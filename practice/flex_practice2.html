<!-- Flexbox  개인 연습 

 .navbar에 Flexbox 사용
SKALA는 왼쪽
메뉴는 오른쪽
메뉴 사이 간격은 20px
모든 요소를 세로 가운데 정렬
배경색은 자유

-->

<!DOCTYPE html>
<html lang="ko">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 연습</title>

    <style> 
                .header {
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
            background-color: lightblue;
        }

        .product-list {
            display: flex;
            grid-template-columns: repeat(3, 1fr);
            gap: center;

            margin-top: 20px;
        }

        .product-card {
            height: 250px;
            padding: 20px;
            border: 1px solid lightgray;

            display: flex;
            flex-direction: center;
        }

        .product-card button {
            margin-top: auto;
            padding: 10px;
        }
    </style>

</head>
    <body>
        <header class="header">
        <h1>상품 목록</h1>
        <span>장바구니 3개</span>
    </header>

    <main class="product-list">
        <article class="product-card">
            <h2>상품 A</h2>
            <p>10,000원</p>
            <button>구매하기</button>
        </article>

        <article class="product-card">
            <h2>상품 B</h2>
            <p>20,000원</p>
            <button>구매하기</button>
        </article>

        <article class="product-card">
            <h2>상품 C</h2>
            <p>30,000원</p>
            <button>구매하기</button>
        </article>
    </main>

</body>

</html>
